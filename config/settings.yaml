# AI Sports Arena configuration.
# Model IDs, bankrolls, and risk limits are all edited here — no code changes needed.

# Each agent gets its own virtual bankroll inside your single Kalshi account.
# 10000 cents = $100. Total money at risk = bankroll_cents x number of agents.
bankroll_cents: 10000

# Max tool-use turns per agent per daily session (hard stop on runaway loops).
max_turns: 25

# Minimum total stake each agent must deploy per daily run ($20). If a session
# would end below this, the agent is nudged once to top up from its best
# remaining opportunities, so every run puts real money to work. Set 0 to let
# agents pass on a flat day instead.
min_deploy_cents_per_run: 2000

# --- Cost controls (applied identically to every agent, so the comparison
# stays fair). See the README "Controlling API cost" section. ---
# Reasoning effort for all models: low | medium | high. Lower = fewer thinking
# tokens (the biggest cost lever); medium keeps analysis strong at ~half the
# thinking spend of high.
effort: medium
# Soft cap on native web searches per session (also a hard cap on Anthropic).
max_searches_per_session: 5
# Hard per-session spend ceiling in cents ($1.50). A session that hits this
# stops early. It's a runaway backstop, not a tight leash. The bot now runs
# DAILY, so budget cost accordingly (~7x a weekly cadence); dropping the
# forced-bet rule means edge-less days end cheaply. 0 disables the cap.
max_cost_cents_per_session: 150

# Hard risk limits — enforced in code on every order, regardless of what any
# model decides.
risk:
  min_stake_cents_per_market: 1000  # each bet must stake at least this ($10)
  max_stake_cents_per_market: 2000  # at most this staked on one market ($20)
  # Net-EV gate: a bet's stated edge must beat the price AND the fee by at least
  # this many cents per contract, or it's rejected. At 1 this is a "never place
  # a bet you yourself expect to lose after fees" floor -- which keeps the $20
  # per-run minimum satisfiable. The system prompt still asks models to *prefer*
  # several cents of edge; raise this to hard-enforce a bigger mispricing (but
  # then some flat days may fall short of the $20 minimum).
  min_edge_cents_per_contract: 1
  max_new_positions_per_week: 0     # 0 = unlimited new markets (no weekly cap)
  max_deployed_pct: 50              # max % of equity tied up in open positions at once
  min_price_cents: 5                # refuse extreme longshots / near-certainties
  max_price_cents: 95
  order_expiration_minutes: 60      # live limit orders auto-expire after this

# Which sports markets agents may see and bet on.
sports:
  # Kalshi series categories to browse (Kalshi files all sports under "Sports").
  categories: ["Sports"]
  # Optional allowlist of series-ticker prefixes (e.g. ["KXMLB", "KXNFL"]).
  # Empty = every sports series currently open on Kalshi.
  series_allowlist: []

# The competitors. Same system prompt, same tools, same bankroll — only the
# model differs. Add/remove/swap models freely; each provider needs its API
# key present or the agent is skipped with a log line.
#
# Pricing is $ per 1M tokens, used only for the dashboard's cost tracker --
# it never touches the betting bankroll. Update these if a provider reprices
# (checked as of 2026-07-02):
#   Claude Opus 4.8:  $5.00 / $25.00  (cache write $6.25, cache read $0.50)
#   GPT-5.5:          $5.00 / $30.00  (cache read ~90% off input, $0.50)
#   Gemini 3.1 Pro:   $2.00 / $12.00  (cache read 10% of input, $0.20)
agents:
  - name: claude
    provider: anthropic
    model: claude-opus-4-8
    price_per_million_input: 5.00
    price_per_million_output: 25.00
    price_per_million_cache_write: 6.25
    price_per_million_cache_read: 0.50
  - name: gpt
    provider: openai
    model: gpt-5.5
    price_per_million_input: 5.00
    price_per_million_output: 30.00
    price_per_million_cache_write: 5.00
    price_per_million_cache_read: 0.50
  - name: gemini
    provider: google
    model: gemini-3.1-pro-preview
    price_per_million_input: 2.00
    price_per_million_output: 12.00
    price_per_million_cache_write: 2.00
    price_per_million_cache_read: 0.20
